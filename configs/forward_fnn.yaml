# Forward problem: predict T(x,y,z,t) with known k
seed: 42
output_dir: outputs/forward_fnn

physics:
  rho_cp: 4.0e6
  k: 0.6
  alpha_absorption: 48.2
  A: 0.4
  T0: 291.0
  Lx: 0.040
  Ly: 0.010
  Lz: 0.005
  r0: 0.001
  Ep: 0.1
  pulse_fwhm: 3.0
  pulse_sigma: 1.274
  t_peak: 3.822
  pulse_period: 20.0
  N_pulses: 3
  T_end: 60.0

network:
  architecture: fnn
  layer_sizes: [4, 100, 100, 100, 100, 100, 1]
  activation: tanh
  kernel_initializer: Glorot normal
  hard_constraint: ramp_softplus

boundary:
  neumann: true

data:
  use_sensors: false
  reference_path: synthetic_data/data/out_Tt.txt

training:
  run_name: forward_fnn
  num_domain: 5000
  num_boundary: 100
  num_initial: 1000
  display_every: 500
  checkpoint: forward_fnn
  phases:
    - optimizer: adam
      lr: 0.001
      iterations: 10000

wandb:
  enabled: false
  project: pinn-laser-heating
  tags: [forward, fnn]
